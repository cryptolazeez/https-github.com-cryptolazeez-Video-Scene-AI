services:
  - type: web
    name: cinescript-ai
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Gemini API Key (get from aistudio.google.com)"
      - key: PORT
        value: 3000
